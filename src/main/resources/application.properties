spring.application.name=clothing-shop

# ===== MySQL =====
# Lay tu bien moi truong; neu khong co thi dung gia tri mac dinh sau dau ":".
# => Khi can mat khau that, dat bien DB_PASSWORD (KHONG ghi mat khau vao day).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/clothing_shop?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# validate = chi kiem tra schema khop voi entity, KHONG tu sua bang
# (database da tao bang file sql/clothing_shop.sql)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Server =====
server.port=8080

# ===== Thong tin ngan hang (QR chuyen khoan) =====
# Bank ID: VCB=Vietcombank, TCB=Techcombank, MB=MBBank, VTB=Vietinbank, BIDV=BIDV, ACB=ACB
shop.bank.id=MBB
shop.bank.account=0877276504
shop.bank.name=TRUONG TRONG QUANG
