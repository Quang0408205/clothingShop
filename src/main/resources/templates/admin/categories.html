<!doctype html>
<div th:replace="admin/layout">
  <div th:fragment="content" class="max-w-7xl mx-auto">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
      <h1 class="text-2xl font-semibold">Danh mục sản phẩm</h1>
      <div class="flex gap-2">
        <a href="/admin/categories/add?type=parent"
           class="inline-flex items-center gap-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg">
          + Thêm nhóm cha
        </a>
        <a href="/admin/categories/add?type=child"
           class="inline-flex items-center gap-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg">
          + Thêm danh mục con
        </a>
      </div>
    </div>

    <!-- Search -->
    <form method="get" action="/admin/categories" class="mb-4 flex gap-2">
      <input type="text" name="q" th:value="${q}"
             placeholder="Tìm theo tên danh mục..."
             class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <button type="submit"
              class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg">Tìm</button>
      <a th:if="${q != null and !#strings.isEmpty(q)}" href="/admin/categories"
         class="bg-gray-200 hover:bg-gray-300 text-sm font-medium px-4 py-2 rounded-lg">Xoá lọc</a>
    </form>

    <!-- Flash messages -->
    <div th:if="${success}" class="mb-4 p-3 rounded-lg bg-green-100 border border-green-200 text-green-800 text-sm flex items-center gap-2">
      <span>✓</span><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="mb-4 p-3 rounded-lg bg-red-100 border border-red-200 text-red-800 text-sm flex items-center gap-2">
      <span>⚠</span><span th:text="${error}"></span>
    </div>

    <!-- Nhóm cha -->
    <div class="bg-white rounded-lg border border-gray-200 mb-6">
      <div class="px-5 py-4 border-b border-gray-100 font-semibold text-sm text-gray-500 uppercase tracking-wide">
        Nhóm danh mục
      </div>
      <table class="min-w-full divide-y divide-gray-100">
        <thead class="bg-gray-50">
          <tr class="text-left text-xs text-gray-500 uppercase">
            <th class="px-5 py-3">Mã</th>
            <th class="px-5 py-3">Tên nhóm</th>
            <th class="px-5 py-3">Slug</th>
            <th class="px-5 py-3">Số DM con</th>
            <th class="px-5 py-3 text-right">Hành động</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr th:each="p : ${parents}" class="hover:bg-gray-50">
            <td class="px-5 py-3 text-sm" th:text="${p.id}"></td>
            <td class="px-5 py-3 font-medium" th:text="${p.name}"></td>
            <td class="px-5 py-3 text-sm text-gray-500 font-mono" th:text="${p.slug}"></td>
            <td class="px-5 py-3 text-sm">
              <span th:with="cnt=${childCount[p.id] != null ? childCount[p.id] : 0}"
                    th:text="${cnt}"
                    class="inline-block bg-indigo-100 text-indigo-700 text-xs font-semibold px-2 py-0.5 rounded-full"></span>
            </td>
            <td class="px-5 py-3 text-right whitespace-nowrap">
              <a th:href="@{'/admin/categories/edit/' + ${p.id}}"
                 class="text-indigo-600 hover:text-indigo-800 text-sm font-medium mr-3">Sửa</a>
              <form th:id="'del-' + ${p.id}" th:action="@{'/admin/categories/delete/' + ${p.id}}" method="post" class="inline">
                <button type="button" class="del-btn text-red-500 hover:text-red-700 text-sm font-medium"
                        th:data-form="'del-' + ${p.id}"
                        th:data-name="${p.name}"
                        data-type="nhóm">Xoá</button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(parents)}">
            <td colspan="5" class="px-5 py-8 text-center text-gray-400 text-sm">Chưa có nhóm danh mục.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Danh mục con -->
    <div class="bg-white rounded-lg border border-gray-200">
      <div class="px-5 py-4 border-b border-gray-100 font-semibold text-sm text-gray-500 uppercase tracking-wide">
        Danh mục sản phẩm
      </div>
      <table class="min-w-full divide-y divide-gray-100">
        <thead class="bg-gray-50">
          <tr class="text-left text-xs text-gray-500 uppercase">
            <th class="px-5 py-3">Mã</th>
            <th class="px-5 py-3">Tên danh mục</th>
            <th class="px-5 py-3">Slug</th>
            <th class="px-5 py-3">Thuộc nhóm</th>
            <th class="px-5 py-3 text-right">Hành động</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr th:each="c : ${children}" class="hover:bg-gray-50">
            <td class="px-5 py-3 text-sm" th:text="${c.id}"></td>
            <td class="px-5 py-3 font-medium" th:text="${c.name}"></td>
            <td class="px-5 py-3 text-sm text-gray-500 font-mono" th:text="${c.slug}"></td>
            <td class="px-5 py-3 text-sm text-gray-500"
                th:text="${c.parentId != null and parentName[c.parentId] != null ? parentName[c.parentId] : '—'}"></td>
            <td class="px-5 py-3 text-right whitespace-nowrap">
              <a th:href="@{'/admin/categories/edit/' + ${c.id}}"
                 class="text-indigo-600 hover:text-indigo-800 text-sm font-medium mr-3">Sửa</a>
              <form th:id="'del-' + ${c.id}" th:action="@{'/admin/categories/delete/' + ${c.id}}" method="post" class="inline">
                <button type="button" class="del-btn text-red-500 hover:text-red-700 text-sm font-medium"
                        th:data-form="'del-' + ${c.id}"
                        th:data-name="${c.name}"
                        data-type="danh mục">Xoá</button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(children)}">
            <td colspan="5" class="px-5 py-8 text-center text-gray-400 text-sm">Chưa có danh mục con.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Modal xác nhận xoá -->
    <div id="delete-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
      <div class="absolute inset-0 bg-black/40" onclick="closeDeleteModal()"></div>
      <div class="relative bg-white rounded-xl shadow-xl p-8 max-w-sm w-full mx-4 text-center">
        <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-800 mb-1">Xác nhận xoá</h3>
        <p id="delete-modal-msg" class="text-sm text-gray-500 mb-6"></p>
        <div class="flex gap-3">
          <button onclick="closeDeleteModal()"
                  class="flex-1 px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium text-sm">Huỷ</button>
          <button id="delete-confirm-btn"
                  class="flex-1 px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white font-medium text-sm">Xoá</button>
        </div>
      </div>
    </div>

    <script>
      var _pendingFormId = null;

      document.querySelectorAll('.del-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          _pendingFormId = btn.getAttribute('data-form');
          var name = btn.getAttribute('data-name');
          var type = btn.getAttribute('data-type');
          document.getElementById('delete-modal-msg').textContent =
            'Bạn có chắc muốn xoá ' + type + ' "' + name + '"? Hành động này không thể hoàn tác.';
          document.getElementById('delete-modal').classList.remove('hidden');
        });
      });

      document.getElementById('delete-confirm-btn').addEventListener('click', function() {
        if (_pendingFormId) document.getElementById(_pendingFormId).submit();
      });

      function closeDeleteModal() {
        _pendingFormId = null;
        document.getElementById('delete-modal').classList.add('hidden');
      }
    </script>
  </div>
</div>
