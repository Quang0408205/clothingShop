<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:replace="admin/layout">

    <div th:fragment="content" class="max-w-7xl mx-auto">
        <div class="bg-white rounded-lg shadow p-6">
            <h1 class="text-2xl font-bold mb-6"
                th:text="${productForm.id() == null ? 'Thêm sản phẩm' : 'Cập nhật sản phẩm'}">
            </h1>

            <div th:if="${uploadError != null}"
                 class="mb-4 rounded border border-red-300 bg-red-50 px-4 py-3 text-red-700"
                 th:text="${uploadError}">
            </div>

            <form th:action="@{/admin/products/save}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="hidden"
                       name="id"
                       th:value="${productForm.id()}">

                <div class="mb-4">
                    <label class="block mb-2 font-medium">
                        Tên sản phẩm
                    </label>

                    <input type="text"
                           name="name"
                           th:value="${productForm.name()}"
                           class="w-full border rounded p-2"
                           required>
                </div>

                <div class="mb-4">
                    <label class="block mb-2 font-medium">
                        Mô tả
                    </label>

                    <textarea name="description"
                              rows="4"
                              class="w-full border rounded p-2"
                              th:text="${productForm.description()}">
                    </textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-2 font-medium">
                            Giá
                        </label>

                        <input type="number"
                               step="0.01"
                               name="price"
                               th:value="${productForm.price()}"
                               class="w-full border rounded p-2"
                               required>
                    </div>

                    <div>
                        <label class="block mb-2 font-medium">
                            Tồn kho
                        </label>

                        <input type="number"
                               name="stock"
                               th:value="${productForm.stock()}"
                               class="w-full border rounded p-2"
                               required>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block mb-2 font-medium">
                        Danh mục
                    </label>

                    <select name="categoryId"
                            class="w-full border rounded p-2"
                            required>

                        <option value="">
                            -- Chọn danh mục --
                        </option>

                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${productForm.categoryId() == c.id}">
                        </option>
                    </select>
                </div>

                <div class="mt-4">
                    <label class="block mb-2 font-medium">
                        Ảnh chính / Thumbnail
                    </label>

                    <input type="file"
                           name="thumbnailFile"
                           accept="image/*"
                           th:required="${productForm.id() == null}"
                           class="w-full border rounded p-2">

                    <div class="mt-3"
                         th:if="${product != null and product.thumbnail != null}">
                        <p class="text-sm text-gray-500 mb-2"
                           th:text="${product.thumbnail}"></p>
                        <img th:src="@{'/' + ${product.thumbnail}}"
                             class="w-48 h-48 object-cover rounded border">
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block mb-2 font-medium">
                        Ảnh phụ sản phẩm
                    </label>

                    <input type="file"
                           name="files"
                           multiple
                           accept="image/*"
                           class="w-full border rounded p-2">

                    <p class="text-sm text-gray-500 mt-1">
                        Có thể chọn nhiều ảnh phụ cùng lúc.
                    </p>
                </div>

                <div class="mt-6"
                     th:if="${product != null and !#lists.isEmpty(product.images)}">

                    <label class="block mb-3 font-medium">
                        Ảnh phụ hiện tại
                    </label>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div th:each="img : ${product.images}">
                            <p th:text="${img.imagePath}"></p>

                            <img th:src="@{'/' + ${img.imagePath}}"
                                 class="w-full h-40 object-cover rounded border">
                        </div>
                    </div>
                </div>

                <div class="mt-6 flex gap-3">
                    <button type="submit"
                            class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded">
                        Lưu sản phẩm
                    </button>

                    <a th:href="@{/admin/products}"
                       class="bg-gray-500 hover:bg-gray-600 text-white px-5 py-2 rounded">
                        Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

</body>
</html>
