<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — MoPo</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    .input-eye { position: relative; }
    .input-eye input { width: 100%; box-sizing: border-box; padding-right: 40px; }
    .eye-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: #9ca3af; line-height: 1;
    }
    .eye-btn:hover { color: #374151; }
  </style>
</head>
<body>
  <div th:replace="~{fragments/layout :: header}"></div>

  <div class="auth-wrap">
    <form class="auth-card" th:action="@{/login}" method="post">
      <h1>ĐĂNG NHẬP</h1>

      <div class="alert ok"    th:if="${param.registered != null}">Đăng ký thành công! Mời bạn đăng nhập.</div>
      <div class="alert ok"    th:if="${param.logout != null}">Bạn đã đăng xuất.</div>
      <div class="alert error" th:if="${param.error != null}">Email hoặc mật khẩu không đúng.</div>

      <label>Email</label>
      <input type="email" name="email" placeholder="email@example.com" required autofocus>

      <label>Mật khẩu</label>
      <div class="input-eye">
        <input id="login-pwd" type="password" name="password" placeholder="••••••••" required>
        <button type="button" class="eye-btn" onclick="toggleEye('login-pwd', this)" title="Hiện/ẩn mật khẩu">
          <svg id="login-pwd-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>

      <button class="btn" type="submit">ĐĂNG NHẬP</button>

      <p class="auth-foot">Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></p>
    </form>
  </div>

  <script>
    function toggleEye(inputId, btn) {
      var inp = document.getElementById(inputId);
      var showing = inp.type === 'text';
      inp.type = showing ? 'password' : 'text';
      btn.style.color = showing ? '' : '#6366f1';
    }
  </script>

  <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
