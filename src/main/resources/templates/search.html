<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'Tìm: ' + ${keyword} + ' — MoPo'">Tìm kiếm — MoPo</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
  <div th:replace="~{fragments/layout :: header}"></div>

  <div class="container">
    <div class="section-head" style="margin-top:30px">
      <h2 th:text="'KẾT QUẢ TÌM KIẾM: ' + ${keyword}">KẾT QUẢ TÌM KIẾM</h2>
      <span class="count" th:text="${#lists.size(products)} + ' sản phẩm'">0 sản phẩm</span>
    </div>

    <div class="empty" th:if="${#lists.isEmpty(products)}">
      <p th:if="${keyword == null or keyword.isBlank()}">Nhập tên sản phẩm để tìm kiếm.</p>
      <p th:unless="${keyword == null or keyword.isBlank()}"
         th:text="'Không tìm thấy sản phẩm nào khớp với &quot;' + ${keyword} + '&quot;.'">Không có kết quả.</p>
      <a class="btn" th:href="@{/}">VỀ TRANG CHỦ</a>
    </div>

    <div class="grid" th:unless="${#lists.isEmpty(products)}">
      <a class="card" th:each="p : ${products}" th:href="@{/products/{id}(id=${p.id})}">
        <div class="thumb-wrap">
          <span class="tag" th:classappend="${p.stock < 40} ? ' hot' : ' new'"
                th:text="${p.stock < 40} ? 'BÁN CHẠY' : 'HÀNG MỚI'">TAG</span>
          <img class="thumb" th:src="@{'/' + ${p.thumbnail}}" th:alt="${p.name}" loading="lazy">
        </div>
        <div class="body">
          <span class="cat" th:text="${p.category.name}">Danh mục</span>
          <h3 th:text="${p.name}">Tên sản phẩm</h3>
          <div class="price-row">
            <span class="price" th:text="${#numbers.formatDecimal(p.price, 0, 'POINT', 0, 'NONE')} + 'đ'">0đ</span>
            <span class="price-old" th:text="${#numbers.formatDecimal(p.price * 1.3, 0, 'POINT', 0, 'NONE')} + 'đ'">0đ</span>
            <span class="discount">-23%</span>
          </div>
        </div>
      </a>
    </div>
  </div>

  <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
