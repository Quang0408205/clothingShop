<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${product.name} + ' — MoPo'">Chi tiết sản phẩm</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
  <div th:replace="~{fragments/layout :: header}"></div>

  <!-- Thông báo đã thêm vào giỏ -->
  <div class="toast" id="toast" th:if="${added}">✓ Đã thêm sản phẩm vào giỏ hàng!</div>

  <div class="container">
    <nav class="breadcrumb">
      <a th:href="@{/}">Trang chủ</a> / <span th:text="${product.category.name}">Danh mục</span> /
      <span th:text="${product.name}">Sản phẩm</span>
    </nav>

    <div class="product">
      <!-- Cột ảnh -->
      <div class="product-media">
        <img class="main-img" th:src="@{'/' + ${product.thumbnail}}" th:alt="${product.name}" id="mainImg">
        <div class="thumbs">
          <img th:each="img : ${product.images}" th:src="@{'/' + ${img.imagePath}}"
               th:alt="${product.name}" loading="lazy"
               onclick="document.getElementById('mainImg').src=this.src">
        </div>
      </div>

      <!-- Cột thông tin -->
      <div class="product-info">
        <span class="cat" th:text="${product.category.name}">Danh mục</span>
        <h1 th:text="${product.name}">Tên sản phẩm</h1>
        <div class="price-row">
          <span class="price-lg" th:text="${#numbers.formatDecimal(product.price, 0, 'POINT', 0, 'NONE')} + 'đ'">0đ</span>
          <span class="price-old" th:text="${#numbers.formatDecimal(product.price * 1.3, 0, 'POINT', 0, 'NONE')} + 'đ'">0đ</span>
          <span class="discount">-23%</span>
        </div>
        <p class="desc" th:text="${product.description}">Mô tả sản phẩm</p>

        <!-- Thông báo lỗi (vd chưa chọn kích cỡ) -->
        <div class="alert error" th:if="${err}" th:text="${err}">Lỗi</div>

        <!-- Tồn kho map trực tiếp từ DB -->
        <div class="stock-line" th:if="${product.stock > 0}">
          <span class="dot"></span> Còn hàng — <strong th:text="${product.stock}">0</strong> sản phẩm trong kho
        </div>
        <div class="stock-line out" th:unless="${product.stock > 0}">
          <span class="dot out"></span> <strong>Hết hàng</strong>
        </div>

        <form class="buy-form" id="buyForm" th:action="@{/cart/add}" method="post">
          <input type="hidden" name="productId" th:value="${product.id}">

          <!-- Chọn kích cỡ (bắt buộc) -->
          <div class="sizes">
            <span class="field-label">Kích cỡ:</span>
            <label class="size"><input type="radio" name="size" value="S"><span>S</span></label>
            <label class="size"><input type="radio" name="size" value="M"><span>M</span></label>
            <label class="size"><input type="radio" name="size" value="L"><span>L</span></label>
            <label class="size"><input type="radio" name="size" value="XL"><span>XL</span></label>
          </div>
          <p class="size-warning" id="sizeWarning">⚠ Vui lòng chọn kích cỡ</p>

          <!-- Số lượng có nút +/- -->
          <div class="qty">
            <span class="field-label">Số lượng:</span>
            <div class="qty-control">
              <button type="button" class="qty-btn" id="qtyMinus">−</button>
              <input type="number" name="quantity" id="qtyInput" value="1" min="1"
                     th:attr="max=${product.stock}">
              <button type="button" class="qty-btn" id="qtyPlus">+</button>
            </div>
          </div>

          <div class="buy-btns" th:if="${product.stock > 0}">
            <button class="btn btn-outline" type="submit" name="action" value="add">THÊM VÀO GIỎ</button>
            <button class="btn" type="submit" name="action" value="buy">MUA NGAY</button>
          </div>
          <div class="buy-btns" th:unless="${product.stock > 0}">
            <button class="btn" type="button" disabled>HẾT HÀNG</button>
          </div>
        </form>

        <ul class="perks">
          <li>🚚 Freeship đơn từ 200K</li>
          <li>🔁 Đổi trả trong 30 ngày</li>
          <li>✅ Cam kết chính hãng</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var input = document.getElementById('qtyInput');
      var minus = document.getElementById('qtyMinus');
      var plus  = document.getElementById('qtyPlus');
      if (!input) return;
      var max = parseInt(input.getAttribute('max')) || 99;
      function clamp(v) { return Math.max(1, Math.min(max, v)); }
      minus.addEventListener('click', function () { input.value = clamp((parseInt(input.value) || 1) - 1); });
      plus.addEventListener('click',  function () { input.value = clamp((parseInt(input.value) || 1) + 1); });
      input.addEventListener('change', function () { input.value = clamp(parseInt(input.value) || 1); });
    })();

    // Tự ẩn toast sau 2.5s
    (function () {
      var t = document.getElementById('toast');
      if (!t) return;
      setTimeout(function () { t.classList.add('hide'); }, 2500);
    })();

    // Bắt buộc chọn kích cỡ trước khi thêm giỏ / mua ngay
    (function () {
      var form = document.getElementById('buyForm');
      var warn = document.getElementById('sizeWarning');
      if (!form) return;
      form.addEventListener('submit', function (e) {
        if (!form.querySelector('input[name="size"]:checked')) {
          e.preventDefault();
          warn.classList.add('show');
          document.querySelector('.sizes').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      });
      // Ẩn cảnh báo ngay khi chọn size
      form.querySelectorAll('input[name="size"]').forEach(function (r) {
        r.addEventListener('change', function () { warn.classList.remove('show'); });
      });
    })();
  </script>

  <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
